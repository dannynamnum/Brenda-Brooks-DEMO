<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brenda Brooks — A Personal Walkthrough</title>
<meta name="description" content="A short personalized walkthrough of a modern website built for Brenda Brooks and the Canyon communities of Boynton Beach." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  /* Option F — Canyon Terracotta & Palm (palette parity with index.html) */
  --cream:        #F3EDE0;
  --warm-white:   #FBF6EC;
  --dark:         #2E3D2A;
  --dark-soft:    #4A5C3F;
  --accent:       #C2703D;
  --accent-dark:  #9A5228;
  --accent-light: #F1E4D2;
  --sand:         #DDD2BC;
  --text-muted:   #5C544A;

  --accent-rgb:        194, 112, 61;
  --dark-rgb:          46, 61, 42;
  --warm-white-rgb:    251, 246, 236;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--warm-white);color:var(--dark-soft);
  font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;
  padding-bottom:64px;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.page{
  max-width:480px;margin:0 auto;
  padding:28px 22px 40px;
  text-align:center;
}

.wordmark{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:26px;color:var(--dark);line-height:1.1;letter-spacing:0.01em;
  margin-bottom:20px;display:inline-block;
}
.wordmark:hover{color:var(--accent-dark);}

.eyebrow{
  font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--accent-dark);font-weight:500;
  margin-bottom:20px;
}

.video-wrap{
  max-width:360px;margin:0 auto;
}
.video-aspect{
  position:relative;
  padding-bottom:217.4129353233831%;
  height:0;background:var(--dark);
  border-radius:6px;overflow:hidden;
  box-shadow:0 24px 50px -28px rgba(var(--dark-rgb),0.4);
}
.video-aspect iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;border:0;
}

.below{ margin-top:32px; }
.btn-demo{
  display:inline-block;background:var(--dark);color:var(--warm-white);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.14em;text-transform:uppercase;
  padding:14px 28px;border-radius:2px;
  transition:background .3s ease,transform .3s ease;
}
.btn-demo:hover{background:var(--accent-dark);transform:translateY(-2px);}
.how{
  display:block;margin-top:18px;
  font-size:13px;color:var(--text-muted);letter-spacing:0.02em;
  text-decoration:underline;text-underline-offset:3px;
  text-decoration-color:var(--sand);
}
.how:hover{color:var(--dark);text-decoration-color:var(--accent);}

.foot{
  margin-top:42px;font-size:11px;color:var(--text-muted);
  letter-spacing:0.04em;line-height:1.6;
}

/* Sticky CTA Bar — Danny brand (SOP spec) */
.sticky-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:200;
  background:#F0EDE8;
  border-top:1px solid rgba(0,0,0,0.08);
  height:64px;
  display:flex;align-items:center;justify-content:center;
}
.bar-inner{
  max-width:480px;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;padding:0 22px;
}
.bar-label{
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;
  color:#3A3530;white-space:nowrap;
}
.bar-cta{
  background:#151821;color:#F0EDE8;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:0.02em;
  padding:11px 24px;border-radius:2px;white-space:nowrap;
  transition:background .25s ease,transform .25s ease;
}
.bar-cta:hover{background:#2C2A33;transform:translateY(-1px);}
.bar-cta .arr{display:inline-block;margin-left:6px;transition:transform .25s ease;}
.bar-cta:hover .arr{transform:translateX(3px);}

@media(max-width:480px){
  body{padding-bottom:60px;}
  .sticky-bar{height:60px;}
  .page{padding:24px 18px 32px;}
  .wordmark{font-size:24px;margin-bottom:18px;}
  .eyebrow{margin-bottom:18px;font-size:10px;letter-spacing:0.28em;}
  .video-wrap{max-width:100%;}
  .bar-inner{gap:14px;padding:0 16px;}
  .bar-label{font-size:12px;}
  .bar-cta{font-size:12px;padding:10px 18px;}
}
@media(max-width:360px){
  .bar-label{font-size:11.5px;}
  .bar-cta{padding:10px 14px;}
}
</style>
</head>
<body>

  <main class="page">
    <a href="https://brenda-brooks-demo.vercel.app/" class="wordmark">Brenda Brooks</a>
    <div class="eyebrow">A Personal Walkthrough</div>

    <div class="video-wrap">
      <div class="video-aspect">
        <iframe src="https://www.loom.com/embed/ce1c8f99fec94c56867678f27fd88440?hide_owner=true&hide_share=true&hide_title=true&hideEmbedTopBar=true&hideLogo=true"
                title="Personal walkthrough"
                allow="fullscreen"
                allowfullscreen></iframe>
      </div>
    </div>

    <div class="below">
      <a class="btn-demo" href="https://brenda-brooks-demo.vercel.app/">View Your Demo</a>
      <a class="how" href="https://namnumdesign.co" target="_blank" rel="noopener">How this works</a>
    </div>

    <div class="foot">Built by Namnum Design Co.</div>
  </main>

  <div class="sticky-bar" role="complementary" aria-label="Booking call to action">
    <div class="bar-inner">
      <div class="bar-label">Like what you see?</div>
      <a class="bar-cta" href="https://fantastical.app/Namnum/Intro-conversation" target="_blank" rel="noopener">Let's Talk<span class="arr">→</span></a>
    </div>
  </div>

</body>
</html>
